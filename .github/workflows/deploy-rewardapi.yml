name: Deploy RewardApi to Azure

on:
  push:
    branches: [main]
    paths:
      - 'Services/Mango.Service.RewardApi/**'
      - '.github/workflows/deploy-rewardapi.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: addis-rewards-api
  PROJECT_PATH: Services/Mango.Service.RewardApi/Mango.Service.RewardApi.csproj
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ github.workspace }}/publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_REWARDSAPI_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish
